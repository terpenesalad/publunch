<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Reader</title>
<link rel="manifest" href="#" id="manifestLink">

<!-- epub.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e4dc;
    --text-dim: #7a7570;
    --text-dimmer: #3d3a37;
    --accent: #c9a96e;
    --accent-dim: rgba(201, 169, 110, 0.15);
    --reader-bg: #0f0f0f;
    --reader-text: #e8e4dc;
    --font-body: 'Lora', Georgia, serif;
    --font-ui: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-size: 18px;
    --line-height: 1.85;
    --max-width: 680px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  [data-theme="sepia"] {
    --bg: #f5efe6;
    --surface: #ede5d8;
    --surface2: #e5dace;
    --border: #c9b99a;
    --text: #2c2416;
    --text-dim: #7a6a50;
    --text-dimmer: #c2aa88;
    --accent: #8b5e3c;
    --accent-dim: rgba(139, 94, 60, 0.12);
    --reader-bg: #f5efe6;
    --reader-text: #2c2416;
  }

  [data-theme="light"] {
    --bg: #f8f8f6;
    --surface: #efefed;
    --surface2: #e8e8e6;
    --border: #d0cfc9;
    --text: #1a1a1a;
    --text-dim: #666560;
    --text-dimmer: #c0bfbc;
    --accent: #1a1a1a;
    --accent-dim: rgba(26, 26, 26, 0.08);
    --reader-bg: #f8f8f6;
    --reader-text: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── SCREENS ── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity var(--transition), transform var(--transition); }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }

  /* ── LIBRARY SCREEN ── */
  #library {
    background: var(--bg);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .lib-header {
    padding: env(safe-area-inset-top, 16px) 24px 0;
    padding-top: max(env(safe-area-inset-top), 24px);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .lib-wordmark {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .lib-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Header action buttons (refresh, delete) */
  .lib-header-actions {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .btn-header-action {
    background: none;
    border: none;
    color: var(--text-dimmer);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color var(--transition);
    line-height: 1;
  }

  .btn-header-action:active { color: var(--text-dim); }
  .btn-header-action:disabled { opacity: 0.2; pointer-events: none; }

  .btn-header-action#btnDeleteSelected:not(:disabled) {
    color: #c97070;
  }

  .btn-header-action#btnRefresh.spinning { animation: spin 0.6s linear; }

  .btn-chip {
    padding: 4px 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all var(--transition);
  }

  .btn-chip:active { background: var(--surface2); }

  .btn-chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .lib-title {
    font-family: var(--font-body);
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.1;
  }

  .lib-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 300;
  }

  .lib-subtitle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }

  .grid-size-control {
    display: flex;
    align-items: center;
  }

  #gridSizeSlider {
    width: 72px;
    height: 2px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  #gridSizeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text-dim);
    cursor: pointer;
    transition: background var(--transition);
  }

  #gridSizeSlider::-webkit-slider-thumb:active {
    background: var(--accent);
  }

  .lib-content { padding: 20px 24px; }

  /* Upload zone */
  .upload-zone {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all var(--transition);
    background: transparent;
    margin-bottom: 20px;
  }

  .upload-zone:active,
  .upload-zone.dragover { background: var(--surface2); border-color: var(--text-dim); }

  .upload-icon {
    font-size: 13px;
    opacity: 0.5;
    line-height: 1;
  }

  .upload-label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
    white-space: nowrap;
  }

  .upload-label strong {
    color: var(--text-dim);
    font-weight: 400;
  }

  #fileInput { display: none; }

  /* Book cards */
  .books-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .book-card {
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform var(--transition), background var(--transition);
    position: relative;
    border: 1px solid var(--border);
  }

  .book-card:active { transform: scale(0.97); background: var(--surface2); }

  .book-cover {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .book-cover-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    border-bottom: 1px solid var(--border);
  }

  .book-meta {
    padding: 10px 12px 12px;
  }

  .book-title {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .book-author {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .book-progress {
    margin-top: 8px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .book-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Selection mode */
  .book-card .select-check {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity var(--transition), background var(--transition), border-color var(--transition);
    z-index: 2;
    pointer-events: none;
    font-size: 13px;
    color: #fff;
  }

  .lib-selecting .book-card .select-check { opacity: 1; }

  .book-card.selected .select-check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .book-card.selected {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }

  .book-card.selected .book-cover,
  .book-card.selected .book-cover-placeholder {
    opacity: 0.7;
  }

  /* Edit button on book cards */
  .book-title-row {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    margin-bottom: 3px;
  }

  .book-title-row .book-title {
    flex: 1;
    margin-bottom: 0;
  }

  .book-edit-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--text-dimmer);
    font-size: 13px;
    cursor: pointer;
    padding: 1px 3px;
    line-height: 1;
    border-radius: 3px;
    transition: color var(--transition);
    margin-top: 1px;
  }

  .book-edit-btn:active { color: var(--text-dim); }

  /* Bookmark items in panel */
  .bookmark-item {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background var(--transition);
  }

  .bookmark-item:active { background: var(--surface2); }

  .bookmark-item-info { flex: 1; min-width: 0; }

  .bookmark-item-label {
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bookmark-item-loc {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    font-family: var(--font-mono);
  }

  .bookmark-delete {
    background: none;
    border: none;
    color: var(--text-dimmer);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
  }

  .bookmark-delete:active { color: #c97070; }

  .bookmark-add-row {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }

  .bookmark-add-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: var(--font-ui);
    font-size: 13px;
    outline: none;
  }

  .bookmark-add-btn {
    padding: 8px 14px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-ui);
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
  }

  /* Selection bar */
  .delete-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 20px max(env(safe-area-inset-bottom), 10px);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 50;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
  }

  .delete-bar.visible { transform: translateY(0); }

  .delete-bar-count {
    flex: 1;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 300;
  }

  .delete-bar-count strong { color: var(--text); font-weight: 500; }

  .btn-cancel-select {
    padding: 8px 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-ui);
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    transition: background var(--transition);
  }

  .btn-cancel-select:active { background: var(--surface2); }

  .btn-delete-selected {
    padding: 10px 18px;
    background: #5c1f1f;
    border: 1px solid #7a2a2a;
    color: #f5a0a0;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: background var(--transition);
  }

  .btn-delete-selected:active { background: #6e2525; }
  .btn-delete-selected:disabled { opacity: 0.4; pointer-events: none; }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-dim);
  }

  .empty-state p { font-size: 14px; font-weight: 300; line-height: 1.6; }

  /* ── READER SCREEN ── */
  #reader {
    background: var(--reader-bg);
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .reader-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: max(env(safe-area-inset-top), 12px) 16px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    transition: transform var(--transition), opacity var(--transition);
    z-index: 20;
  }

  .reader-topbar.hidden-bar {
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none;
  }

  .btn-icon {
    width: 44px;
    height: 44px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background var(--transition), color var(--transition);
    -webkit-tap-highlight-color: transparent;
  }

  .btn-icon:active { background: var(--surface2); }

  .reader-book-title {
    flex: 1;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-style: italic;
  }

  /* Content area */
  .reader-body {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #epubFrame {
    width: 100%;
    height: 100%;
    border: none;
    background: var(--reader-bg);
  }

  /* Reader content for non-iframe rendering */
  #readingArea {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 32px 24px 80px;
    background: var(--reader-bg);
  }

  #readingContent {
    max-width: var(--max-width);
    margin: 0 auto;
    font-family: var(--font-body);
    font-size: var(--font-size);
    line-height: var(--line-height);
    color: var(--reader-text);
  }

  #readingContent h1, #readingContent h2, #readingContent h3 {
    font-family: var(--font-body);
    font-weight: 500;
    margin: 2em 0 0.8em;
    color: var(--reader-text);
    line-height: 1.25;
  }

  #readingContent h1 { font-size: 1.6em; }
  #readingContent h2 { font-size: 1.3em; }
  #readingContent h3 { font-size: 1.1em; }

  #readingContent p {
    margin-bottom: 1.1em;
    hyphens: auto;
    -webkit-hyphens: auto;
  }

  #readingContent em, #readingContent i { font-style: italic; }
  #readingContent strong, #readingContent b { font-weight: 500; }

  #readingContent img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 1.5em auto;
    border-radius: 4px;
  }

  #readingContent a { color: var(--accent); text-decoration: none; }

  /* Chapter nav at bottom of content */
  .chapter-nav-inline {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 0 0;
    margin-top: 32px;
    border-top: 1px solid var(--border);
    gap: 12px;
  }

  .chapter-nav-btn {
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 400;
    border-radius: 8px;
    cursor: pointer;
    transition: background var(--transition);
    flex: 1;
    text-align: center;
  }

  .chapter-nav-btn:active { background: var(--surface2); }
  .chapter-nav-btn:disabled { opacity: 0.3; pointer-events: none; }

  /* Bottom bar */
  .reader-bottombar {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 8px 8px max(env(safe-area-inset-bottom), 8px);
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    transition: transform var(--transition), opacity var(--transition);
    z-index: 20;
  }

  .reader-bottombar.hidden-bar {
    transform: translateY(100%);
    opacity: 0;
    pointer-events: none;
  }

  .progress-info {
    flex: 1;
    text-align: center;
  }

  .progress-chapter {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
    margin: 0 auto;
  }

  .progress-pct {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dimmer);
    margin-top: 1px;
  }

  /* ── PANELS (TOC, Settings) ── */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    backdrop-filter: blur(2px);
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
  }

  .panel-overlay.open { opacity: 1; pointer-events: all; }

  .panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    z-index: 101;
    max-height: 75vh;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .panel.open { transform: translateY(0); }

  .panel-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }

  .panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 0 16px;
  }

  /* TOC */
  .toc-item {
    padding: 13px 20px;
    cursor: pointer;
    font-size: 15px;
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.3;
    transition: background var(--transition);
    border-left: 3px solid transparent;
  }

  .toc-item:active { background: var(--surface2); }
  .toc-item.active { color: var(--accent); border-left-color: var(--accent); }
  .toc-item.level-2 { padding-left: 36px; font-size: 13px; color: var(--text-dim); }
  .toc-item.level-3 { padding-left: 52px; font-size: 12px; color: var(--text-dim); }

  /* Settings */
  .setting-row {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .setting-label {
    font-size: 14px;
    color: var(--text);
    flex: 1;
    font-weight: 300;
  }

  .setting-control {
    display: flex;
    gap: 6px;
  }

  .set-btn {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-ui);
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: all var(--transition);
    min-width: 44px;
    text-align: center;
  }

  .set-btn:active, .set-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .font-size-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .font-size-slider {
    flex: 1;
    height: 2px;
    -webkit-appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  .font-size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .font-preview {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    min-width: 32px;
    text-align: right;
  }

  /* Stats panel */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    margin: 8px 0;
  }

  .stats-cell {
    background: var(--surface);
    padding: 16px 20px;

  }

  .stats-cell-val {
    font-family: var(--font-mono);

  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);

  /* Scrollbar */

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════

const DB_NAME = 'readerDB';
const DB_VER = 1;
let db;

const state = {
  books: [],
  progress: {},
  settings: {
    theme: 'dark',
    fontSize: 18,
    font: 'serif',
    lineHeight: 1.85,
    wakeLock: false,
    paginated: false
  },
  currentBook: null,
  currentChapterIdx: 0,
  currentSpine: [],
  currentToc: [],
  barsVisible: true,
  selectMode: false,
  selectedBooks: new Set(),
  // paginated mode runtime
  pages: [],
  currentPageIdx: 0,
  totalChaptersRead: 0,
  sessionStart: Date.now(),
  sessionChapters: 0
};

// ═══════════════════════════════════════
// INDEXEDDB SETUP
// ═══════════════════════════════════════

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('books')) d.createObjectStore('books', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('files')) d.createObjectStore('files', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('kv')) d.createObjectStore('kv', { keyPath: 'k' });
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}

function dbPut(store, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

async function saveKV(k, v) { await dbPut('kv', { k, v }); }
async function loadKV(k, def) { const r = await dbGet('kv', k); return r ? r.v : def; }

// ═══════════════════════════════════════
// EPUB PARSER
// ═══════════════════════════════════════

async function parseEPUB(arrayBuffer) {
  const zip = await JSZip.loadAsync(arrayBuffer);

  // Read container.xml to find OPF path
  const containerXml = await zip.file('META-INF/container.xml').async('string');
  const parser = new DOMParser();
  const containerDoc = parser.parseFromString(containerXml, 'text/xml');
  const opfPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
  const opfDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);

  // Parse OPF
  const opfXml = await zip.file(opfPath).async('string');
  const opfDoc = parser.parseFromString(opfXml, 'text/xml');

  // Metadata
  const title = opfDoc.querySelector('title')?.textContent || 'Unknown Title';
  const author = opfDoc.querySelector('creator')?.textContent || 'Unknown Author';

  // Manifest
  const manifest = {};
  opfDoc.querySelectorAll('manifest item').forEach(item => {
    manifest[item.getAttribute('id')] = {
      href: item.getAttribute('href'),
      mediaType: item.getAttribute('media-type')
    };
  });

  // Spine (reading order)
  const spine = [];
  opfDoc.querySelectorAll('spine itemref').forEach(ref => {
    const id = ref.getAttribute('idref');
    if (manifest[id]) {
      spine.push({ id, href: opfDir + manifest[id].href, mediaType: manifest[id].mediaType });
    }
  });

  // Cover image — stored as base64 data URL so it persists across sessions
  let coverUrl = null;
  const coverId = opfDoc.querySelector('meta[name="cover"]')?.getAttribute('content')
    || [...opfDoc.querySelectorAll('item')].find(i => i.getAttribute('id') === 'cover-image' || i.getAttribute('properties')?.includes('cover-image'))?.getAttribute('id');

  if (coverId && manifest[coverId]) {
    try {
      const coverFile = zip.file(opfDir + manifest[coverId].href)
        || zip.file(manifest[coverId].href);
      if (coverFile) {
        const coverData = await coverFile.async('base64');
        const mimeType = manifest[coverId].mediaType || 'image/jpeg';
        coverUrl = `data:${mimeType};base64,${coverData}`;
      }
    } catch(e) {}
  }

  // Fallback: scan manifest for any image with "cover" in the name
  if (!coverUrl) {
    const allImages = Object.values(manifest).filter(m => m.mediaType?.startsWith('image/'));
    const coverCandidate = allImages.find(m => /cover/i.test(m.href));
    if (coverCandidate) {
      try {
        const f = zip.file(opfDir + coverCandidate.href) || zip.file(coverCandidate.href);
        if (f) {
          const d = await f.async('base64');
          coverUrl = `data:${coverCandidate.mediaType};base64,${d}`;
        }
      } catch(e) {}
    }
  }

  // NCX / NAV toc
  const toc = [];
  const ncxId = opfDoc.querySelector('spine')?.getAttribute('toc');
  const navItem = [...opfDoc.querySelectorAll('manifest item')].find(i =>
    i.getAttribute('properties')?.includes('nav') || i.getAttribute('media-type') === 'application/x-dtbncx+xml'
  );

  if (ncxId && manifest[ncxId]) {
    try {
      const ncxXml = await (zip.file(opfDir + manifest[ncxId].href) || zip.file(manifest[ncxId].href))?.async('string');
      if (ncxXml) {
        const ncxDoc = parser.parseFromString(ncxXml, 'text/xml');
        ncxDoc.querySelectorAll('navPoint').forEach(np => {
          const label = np.querySelector('text')?.textContent?.trim() || '';
          const src = np.querySelector('content')?.getAttribute('src') || '';
          const spineIdx = spine.findIndex(s => s.href.endsWith(src.split('#')[0]));
          toc.push({ label, href: opfDir + src, spineIdx: spineIdx >= 0 ? spineIdx : 0, level: 1 });
        });
      }
    } catch(e) {}
  }

  if (toc.length === 0) {
    spine.forEach((s, i) => toc.push({ label: `Chapter ${i+1}`, href: s.href, spineIdx: i, level: 1 }));
  }

  // Load chapter content
  async function getChapterContent(idx) {
    if (idx < 0 || idx >= spine.length) return null;
    const item = spine[idx];
    const file = zip.file(item.href) || zip.file(item.href.replace(/^.*\//, ''));
    if (!file) return null;
    const html = await file.async('string');

    // Parse and sanitize
    const doc = parser.parseFromString(html, 'text/html');

    // Resolve images
    for (const img of doc.querySelectorAll('img, image')) {
      const src = img.getAttribute('src') || img.getAttribute('xlink:href') || '';
      if (src && !src.startsWith('http') && !src.startsWith('data:')) {
        const imgDir = item.href.substring(0, item.href.lastIndexOf('/') + 1);
        const imgPath = imgDir + src;
        try {
          const imgFile = zip.file(imgPath);
          if (imgFile) {
            const blob = await imgFile.async('blob');
            const url = URL.createObjectURL(blob);
            img.setAttribute('src', url);
          }
        } catch(e) {}
      }
    }

    // Remove scripts, links
    doc.querySelectorAll('script, style, link').forEach(el => el.remove());

    return doc.body?.innerHTML || doc.documentElement?.innerHTML || '';
  }

  return { title, author, coverUrl, spine, toc, getChapterContent };
}

// ═══════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════

function showToast(msg, dur = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function openPanel(name) {
  document.getElementById(name + 'Overlay').classList.add('open');
  document.getElementById(name + 'Panel').classList.add('open');
}

function closePanel(name) {
  document.getElementById(name + 'Overlay').classList.remove('open');
  document.getElementById(name + 'Panel').classList.remove('open');
}

['toc', 'settings', 'stats', 'bookmark', 'edit'].forEach(name => {
  document.getElementById(name + 'Overlay').addEventListener('click', () => closePanel(name));
});

// ═══════════════════════════════════════
// LIBRARY
// ═══════════════════════════════════════

// ── Grid size slider ──
function applyGridSize(cols) {
  document.getElementById('booksGrid').style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  document.getElementById('gridSizeSlider').value = cols;
}

document.getElementById('gridSizeSlider').addEventListener('input', e => {
  const cols = parseInt(e.target.value);
  applyGridSize(cols);
  saveKV('gridSize', cols);
});

async function loadGridSize() {
  const saved = await loadKV('gridSize', 2);
  applyGridSize(saved);
}

async function loadLibrary() {
  state.books = await dbGetAll('books');
  state.progress = await loadKV('progress', {});
  renderLibrary();
}

function renderLibrary() {
  const grid = document.getElementById('booksGrid');
  const empty = document.getElementById('emptyState');

  grid.innerHTML = '';

  if (state.books.length === 0) {
    empty.style.display = 'block';
    document.getElementById('libSubtitle').textContent = 'Add your first book';
    return;
  }

  empty.style.display = 'none';
  document.getElementById('libSubtitle').textContent = `${state.books.length} book${state.books.length !== 1 ? 's' : ''}`;

  state.books.sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));

  state.books.forEach(book => {
    const prog = state.progress[book.id] || { chapterIdx: 0, chaptersRead: 0 };
    const pct = book.totalChapters > 1 ? Math.round((prog.chaptersRead / (book.totalChapters - 1)) * 100) : 0;

    const card = document.createElement('div');
    card.className = 'book-card';
    card.dataset.id = book.id;

    card.innerHTML = `
      ${book.coverUrl
        ? `<img class="book-cover" src="${book.coverUrl}" alt="${book.title}" loading="lazy">`
        : `<div class="book-cover-placeholder">📚</div>`}
      <div class="select-check">✓</div>
      <div class="book-meta">
        <div class="book-title-row">
          <div class="book-title">${book.title}</div>
          <button class="book-edit-btn" data-id="${book.id}" title="Edit">✎</button>
        </div>
        <div class="book-author">${book.author}</div>
        <div class="book-progress">
          <div class="book-progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
    `;

    card.addEventListener('click', () => {
      if (state.selectMode) {
        toggleSelectBook(book.id, card);
      } else {
        openBook(book.id);
      }
    });

    card.querySelector('.book-edit-btn').addEventListener('click', e => {
      e.stopPropagation();
      openEditPanel(book.id);
    });

    // Long press to enter select mode
    let pressTimer;
    let didLongPress = false;
    card.addEventListener('touchstart', e => {
      didLongPress = false;
      pressTimer = setTimeout(() => {
        didLongPress = true;
        enterSelectMode();
        toggleSelectBook(book.id, card);
      }, 500);
    }, { passive: true });
    card.addEventListener('touchend', () => clearTimeout(pressTimer));
    card.addEventListener('touchmove', () => clearTimeout(pressTimer), { passive: true });

    grid.appendChild(card);
  });
}

async function deleteBook(id) {
  state.books = state.books.filter(b => b.id !== id);
  delete state.progress[id];
  await dbDelete('books', id);
  await dbDelete('files', id);
  await saveKV('progress', state.progress);
  renderLibrary();
  showToast('Book removed');
}

function enterSelectMode() {
  state.selectMode = true;
  state.selectedBooks.clear();
  document.getElementById('library').classList.add('lib-selecting');
  document.getElementById('btnSelectMode').classList.add('active');
  document.getElementById('btnSelectMode').textContent = 'Selecting';
  updateDeleteBar();
}

function exitSelectMode() {
  state.selectMode = false;
  state.selectedBooks.clear();
  document.getElementById('library').classList.remove('lib-selecting');
  document.querySelectorAll('.book-card.selected').forEach(c => c.classList.remove('selected'));
  document.getElementById('deleteBar').classList.remove('visible');
  document.getElementById('btnSelectMode').classList.remove('active');
  document.getElementById('btnSelectMode').textContent = 'Select';
}

document.getElementById('btnSelectMode').addEventListener('click', () => {
  if (state.selectMode) exitSelectMode();
  else enterSelectMode();
});

function toggleSelectBook(id, card) {
  if (state.selectedBooks.has(id)) {
    state.selectedBooks.delete(id);
    card.classList.remove('selected');
  } else {
    state.selectedBooks.add(id);
    card.classList.add('selected');
  }
  updateDeleteBar();
}

function updateDeleteBar() {
  const n = state.selectedBooks.size;
  const bar = document.getElementById('deleteBar');
  const count = document.getElementById('deleteBarCount');
  const delBtn = document.getElementById('btnDeleteSelected');
  count.innerHTML = n > 0 ? `<strong>${n}</strong> selected` : 'Tap books to select';
  delBtn.disabled = n === 0;

document.getElementById('btnCancelSelect').addEventListener('click', exitSelectMode);

document.getElementById('btnDeleteSelected').addEventListener('click', async () => {
  const ids = [...state.selectedBooks];
  if (!ids.length) return;
  exitSelectMode();
  for (const id of ids) {
    state.books = state.books.filter(b => b.id !== id);
    delete state.progress[id];
    await dbDelete('books', id);
    await dbDelete('files', id);
  }
  await saveKV('progress', state.progress);
  renderLibrary();
  showToast(`${ids.length} book${ids.length !== 1 ? 's' : ''} removed`);
});

async function refreshCovers() {
  const btn = document.getElementById('btnRefresh');
  btn.style.animation = 'spin 0.6s linear';
  setTimeout(() => btn.style.animation = '', 700);
  let updated = 0;
  for (const book of state.books) {
    if (book.coverUrl) continue; // already has one
    try {
      const fileRecord = await dbGet('files', book.id);
      if (!fileRecord) continue;
      const epub = await parseEPUB(fileRecord.buffer);
      if (epub.coverUrl) {
        book.coverUrl = epub.coverUrl;
        await dbPut('books', book);
        updated++;
      }
    } catch(e) {}
  }
  btn.classList.remove('spinning');
  renderLibrary();
  showToast(updated > 0 ? `${updated} cover${updated !== 1 ? 's' : ''} refreshed` : 'No new covers found');
}

document.getElementById('btnRefresh').addEventListener('click', refreshCovers);

// Drag & drop
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  handleFiles(Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.epub')));
});

async function handleFiles(files) {
  for (const file of files) {
    if (!file.name.endsWith('.epub')) { showToast(`${file.name} is not an EPUB`); continue; }
    showToast(`Adding "${file.name}"…`, 3000);
    try {
      const buffer = await file.arrayBuffer();
      const epub = await parseEPUB(buffer);
      const id = 'book_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);

      const bookMeta = {
        id,
        title: epub.title,
        author: epub.author,
        coverUrl: epub.coverUrl,
        totalChapters: epub.spine.length,
        toc: epub.toc,
        addedAt: Date.now()
      };

      await dbPut('books', bookMeta);
      await dbPut('files', { id, buffer });
      state.books.push(bookMeta);
      renderLibrary();
      showToast(`"${epub.title}" added ✓`);
    } catch (err) {
      console.error(err);
      showToast(`Error loading ${file.name}`);
    }
  }
}

let currentEpub = null;

async function openBook(bookId) {
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;

  showScreen('reader');
  state.currentBook = book;
  document.getElementById('readerTitle').textContent = book.title;

  // Show loader
  document.getElementById('readingContent').innerHTML = `
    <div class="loader" style="height:60vh">
      <div class="loader-spinner"></div>
      <div class="loader-text">Opening book…</div>
    </div>`;

  const fileRecord = await dbGet('files', bookId);
  if (!fileRecord) { showToast('Book file not found'); return; }

  try {
    currentEpub = await parseEPUB(fileRecord.buffer);
    state.currentSpine = currentEpub.spine;
    state.currentToc = currentEpub.toc;

    const prog = state.progress[bookId] || { chapterIdx: 0, chaptersRead: 0, scrollTop: 0 };
    state.currentChapterIdx = prog.chapterIdx || 0;

    await loadChapter(state.currentChapterIdx, prog.scrollTop || 0);
    renderToc();
  } catch(err) {
    console.error(err);
    document.getElementById('readingContent').innerHTML = `<p style="color:var(--text-dim)">Error opening book. The EPUB may be unsupported.</p>`;
  }
}

async function loadChapter(idx, scrollTop = 0) {
  if (!currentEpub) return;
  idx = Math.max(0, Math.min(idx, currentEpub.spine.length - 1));
  state.currentChapterIdx = idx;

  const content = await currentEpub.getChapterContent(idx);
  if (content === null) { showToast('Chapter not found'); return; }

  const readingContent = document.getElementById('readingContent');

  if (state.settings.paginated) {
    state.pages = buildPages(content);
    state.currentPageIdx = 0;
    readingContent.innerHTML = state.pages[0] || content;
  } else {
    readingContent.innerHTML = content;
  }

  applyReadingSettings();

  // Chapter nav buttons (only relevant in scroll mode)
  document.getElementById('btnPrevChap').disabled = idx === 0;
  document.getElementById('btnNextChap').disabled = idx >= currentEpub.spine.length - 1;
  document.getElementById('btnPrevChapBot').disabled = idx === 0;
  document.getElementById('btnNextChapBot').disabled = idx >= currentEpub.spine.length - 1;

  // Scroll position (only relevant in scroll mode)
  if (!state.settings.paginated) {
    const area = document.getElementById('readingArea');
    area.scrollTop = scrollTop;
  }

  updatePageLabel();
  saveProgress();

  // Track progress
  if (!state.progress[state.currentBook.id])
    state.progress[state.currentBook.id] = { chapterIdx: 0, chaptersRead: 0 };
  const prog = state.progress[state.currentBook.id];
  if (idx > (prog.chaptersRead || 0)) {
    prog.chaptersRead = idx;
    state.sessionChapters++;
    await saveKV('progress', state.progress);
    renderLibrary();
  }
}

function saveProgress() {
  if (!state.currentBook) return;
  const area = document.getElementById('readingArea');
  if (!state.progress[state.currentBook.id]) state.progress[state.currentBook.id] = {};
  state.progress[state.currentBook.id].chapterIdx = state.currentChapterIdx;
  if (!state.settings.paginated) {
    state.progress[state.currentBook.id].scrollTop = area.scrollTop;
  }
  saveKV('progress', state.progress);
}

document.getElementById('btnPrevChap').addEventListener('click', () => {

document.getElementById('btnNextChap').addEventListener('click', () => {

// ── SCREEN LOCK (Wake Lock API) ──
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) {
    showToast('Screen lock not supported on this browser');
    return false;
  }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => {
      // Re-acquire if page is still visible and lock is still enabled
      if (state.settings.wakeLock && document.visibilityState === 'visible') {
        requestWakeLock();
      } else {
        updateWakeLockBtn(false);
      }
    });
    return true;
  } catch (e) {
    showToast('Could not lock screen');
    return false;
  }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

function updateWakeLockBtn(on) {
  const btn = document.getElementById('btnWakeLock');
  btn.textContent = on ? 'On' : 'Off';
  btn.classList.toggle('active', on);
}

document.getElementById('btnWakeLock').addEventListener('click', async () => {
  const next = !state.settings.wakeLock;
  state.settings.wakeLock = next;
  if (next) {
    const ok = await requestWakeLock();
    updateWakeLockBtn(ok);
    if (ok) showToast('Screen will stay on while reading');
  } else {
    releaseWakeLock();
    updateWakeLockBtn(false);
    showToast('Screen lock off');
  }
  saveKV('settings', state.settings);
});

// Re-acquire lock when tab becomes visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.settings.wakeLock && !wakeLock) {
    requestWakeLock();
  }
});

function applyReadingSettings() {
  const s = state.settings;
  const content = document.getElementById('readingContent');
  content.style.fontSize = s.fontSize + 'px';
  content.style.lineHeight = s.lineHeight;
  content.style.fontFamily = s.font === 'sans'
    ? "'DM Sans', system-ui, sans-serif"
    : "'Lora', Georgia, serif";
}

async function loadSettings() {
  const saved = await loadKV('settings', null);
  if (saved) Object.assign(state.settings, saved);

  const s = state.settings;
  document.body.dataset.theme = s.theme;
  document.getElementById('fontSizeSlider').value = s.fontSize;
  document.getElementById('fontSizeVal').textContent = s.fontSize;
  document.querySelectorAll('[data-theme]').forEach(b => b.classList.toggle('active', b.dataset.theme === s.theme));
  document.querySelectorAll('[data-font]').forEach(b => b.classList.toggle('active', b.dataset.font === s.font));
  document.querySelectorAll('[data-lh]').forEach(b => b.classList.toggle('active', b.dataset.lh === String(s.lineHeight)));
  updateWakeLockBtn(!!s.wakeLock);
  if (s.wakeLock) requestWakeLock();
  applyPageMode(!!s.paginated);
}

// ═══════════════════════════════════════
// PAGINATED MODE ENGINE
// ═══════════════════════════════════════

function buildPages(html) {
  const area     = document.getElementById('readingArea');
  const readerBody = document.getElementById('readerBody');

  // readerBody is flex:1 so its height IS the usable reading area (bars are outside it)
  // Just subtract the content padding we apply inside readingArea
  const padT    = 32;
  const padB    = 24;
  const usableH = readerBody.clientHeight - padT - padB;

  const areaW   = area.clientWidth;
  const padH    = 24; // left/right padding per side

  const probe = document.createElement('div');
  probe.style.cssText = [
    'position:absolute', 'top:0', 'left:0', 'visibility:hidden',
    'pointer-events:none', `width:${areaW - padH * 2}px`,
    `font-family:${state.settings.font === 'sans' ? "'DM Sans',sans-serif" : "'Lora',Georgia,serif"}`,
    `font-size:${state.settings.fontSize}px`,
    `line-height:${state.settings.lineHeight}`,
    'word-break:break-word', 'overflow-wrap:break-word'
  ].join(';');
  probe.innerHTML = html;
  document.body.appendChild(probe);

  const pages = [];
  let bucket = [], bucketH = 0;

  function flush() {
    if (bucket.length) {
      pages.push(bucket.map(n => n.outerHTML || n.textContent || '').join(''));
      bucket = []; bucketH = 0;
    }
  }

  Array.from(probe.children).forEach(child => {
    const h = child.offsetHeight;
    if (h === 0) return;
    if (h > usableH) { flush(); pages.push(child.outerHTML); return; }
    if (bucketH + h > usableH) flush();
    bucket.push(child);
    bucketH += h;
  });
  flush();

  document.body.removeChild(probe);
  return pages.length ? pages : [html];
}

function renderCurrentPage() {
  const content = document.getElementById('readingContent');
  content.innerHTML = state.pages[state.currentPageIdx] || '';
  applyReadingSettings();
  updatePageLabel();
}

function updatePageLabel() {
  const toc = state.currentToc;
  const idx = state.currentChapterIdx;
  const entry = toc.find(t => t.spineIdx === idx)
    || toc[Math.max(0, toc.findIndex(t => t.spineIdx > idx) - 1)]
    || toc[0];
  const label = entry?.label || `Ch. ${idx + 1}`;
  const suffix = state.settings.paginated && state.pages.length > 1
    ? ` · ${state.currentPageIdx + 1}/${state.pages.length}` : '';
  document.getElementById('progressChapter').textContent = label + suffix;

  const book = state.currentBook;
  const pct = book?.totalChapters > 1
    ? Math.round((idx / (book.totalChapters - 1)) * 100) : 100;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('readingProgressFill').style.width = pct + '%';
}

async function paginateChapter(idx) {
  const content = await currentEpub.getChapterContent(idx);
  if (!content) return;
  state.pages = buildPages(content);
}

async function turnPage(direction) {
  if (!currentEpub) return;
  const goNext  = direction === 'next';
  const atLast  = state.currentPageIdx >= state.pages.length - 1;
  const atFirst = state.currentPageIdx <= 0;

  if (goNext && atLast) {
    if (state.currentChapterIdx >= currentEpub.spine.length - 1) return;
    state.currentChapterIdx++;
    await paginateChapter(state.currentChapterIdx);
    state.currentPageIdx = 0;
    renderCurrentPage();
    trackChapterProgress(state.currentChapterIdx);
  } else if (!goNext && atFirst) {
    if (state.currentChapterIdx <= 0) return;
    state.currentChapterIdx--;
    await paginateChapter(state.currentChapterIdx);
    state.currentPageIdx = state.pages.length - 1;
    renderCurrentPage();
  } else {
    state.currentPageIdx += goNext ? 1 : -1;
    renderCurrentPage();
  }
  saveProgress();
}

function trackChapterProgress(idx) {
  if (!state.currentBook) return;
  if (!state.progress[state.currentBook.id])
    state.progress[state.currentBook.id] = { chapterIdx: 0, chaptersRead: 0 };
  const prog = state.progress[state.currentBook.id];
  if (idx > (prog.chaptersRead || 0)) {
    prog.chaptersRead = idx;
    state.sessionChapters++;
    saveKV('progress', state.progress);
  }
}

// ── Swipe: only active in paginated mode ──
(function() {
  const body = document.getElementById('readerBody');
  let x0 = 0, y0 = 0, t0 = 0;

  body.addEventListener('touchstart', e => {
    x0 = e.touches[0].clientX;
    y0 = e.touches[0].clientY;
    t0 = Date.now();
  }, { passive: true });

  body.addEventListener('touchend', e => {
    if (!state.settings.paginated) return;
    const dx = e.changedTouches[0].clientX - x0;
    const dy = e.changedTouches[0].clientY - y0;
    const dt = Date.now() - t0;
    const isHoriz = Math.abs(dx) > Math.abs(dy) * 1.3 && Math.abs(dx) > 50 && dt < 500;
    if (!isHoriz) return;
    turnPage(dx < 0 ? 'next' : 'prev');
  }, { passive: true });
})();

// ── Page mode toggle ──
function applyPageMode(on) {
  document.getElementById('btnPageMode').textContent = on ? 'On' : 'Off';
  document.getElementById('btnPageMode').classList.toggle('active', on);
  if (on) {
    document.body.classList.add('paginated');
  } else {
    document.body.classList.remove('paginated');
    state.pages = [];
    state.currentPageIdx = 0;
  }
}

document.getElementById('btnPageMode').addEventListener('click', async () => {
  const next = !state.settings.paginated;
  state.settings.paginated = next;
  applyPageMode(next);
  saveKV('settings', state.settings);
  if (next && currentEpub) {
    await paginateChapter(state.currentChapterIdx);
    state.currentPageIdx = 0;
    renderCurrentPage();
    showToast('Paginated on — swipe to turn');
  } else if (!next && currentEpub) {
    const content = await currentEpub.getChapterContent(state.currentChapterIdx);
    document.getElementById('readingContent').innerHTML = content || '';
    applyReadingSettings();
    updatePageLabel();
    showToast('Scroll mode on');
  }
});

function renderBookmarkPanel() {
  const body = document.getElementById('bookmarkBody');
  const bookId = state.currentBook?.id;
  if (!bookId) { body.innerHTML = '<div style="padding:20px;color:var(--text-dim);font-size:14px;">Open a book first.</div>'; return; }

  const list = bookmarks[bookId] || [];
  const toc = state.currentToc;
  const idx = state.currentChapterIdx;
  const entry = toc.find(t => t.spineIdx === idx) || toc[0];
  const chapterLabel = entry?.label || `Ch. ${idx + 1}`;
  const pageLabel = state.settings.paginated ? ` · p${state.currentPageIdx + 1}` : '';

  body.innerHTML = `
    <div class="bookmark-add-row">
      <input class="bookmark-add-input" id="bmInput" placeholder="Bookmark name (optional)" value="${chapterLabel}${pageLabel}">
      <button class="bookmark-add-btn" id="bmAddBtn">Add</button>
    </div>
    <div id="bmList"></div>
  `;

  const bmList = body.querySelector('#bmList');

  if (list.length === 0) {
    bmList.innerHTML = '<div style="padding:16px 20px;color:var(--text-dim);font-size:13px;font-weight:300;">No bookmarks yet.</div>';
  } else {
    list.slice().reverse().forEach(bm => {
      const item = document.createElement('div');
      item.className = 'bookmark-item';
      const loc = bm.pageIdx != null
        ? `Ch. ${bm.chapterIdx + 1} · p${bm.pageIdx + 1}`
        : `Ch. ${bm.chapterIdx + 1}`;
      item.innerHTML = `
        <div class="bookmark-item-info">
          <div class="bookmark-item-label">${bm.label}</div>
          <div class="bookmark-item-loc">${loc}</div>
        </div>
        <button class="bookmark-delete" data-id="${bm.id}">✕</button>
      `;
      item.querySelector('.bookmark-item-info').addEventListener('click', async () => {
        closePanel('bookmark');
        if (bm.chapterIdx !== state.currentChapterIdx) {
          await loadChapter(bm.chapterIdx);
        }
        if (state.settings.paginated && bm.pageIdx != null) {
          state.currentPageIdx = bm.pageIdx;
          renderCurrentPage();
        }
      });
      item.querySelector('.bookmark-delete').addEventListener('click', async e => {
        e.stopPropagation();
        bookmarks[bookId] = (bookmarks[bookId] || []).filter(b => b.id !== bm.id);
        await saveBookmarks();
        renderBookmarkPanel();
      });
      bmList.appendChild(item);
    });
  }

  body.querySelector('#bmAddBtn').addEventListener('click', async () => {
    const label = body.querySelector('#bmInput').value.trim() || chapterLabel;
    if (!bookmarks[bookId]) bookmarks[bookId] = [];
    bookmarks[bookId].push({
      id: 'bm_' + Date.now(),
      label,
      chapterIdx: state.currentChapterIdx,
      pageIdx: state.settings.paginated ? state.currentPageIdx : null,
      createdAt: Date.now()
    });
    await saveBookmarks();
    renderBookmarkPanel();
    showToast('Bookmark added');
  });
}

// ═══════════════════════════════════════
// EDIT BOOK PANEL
// ═══════════════════════════════════════

let editingBookId = null;
let editingCoverDataUrl = null;

function openEditPanel(bookId) {
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;
  editingBookId = bookId;
  editingCoverDataUrl = null;

  document.getElementById('editTitle').value = book.title;
  document.getElementById('editAuthor').value = book.author;

  const preview = document.getElementById('editCoverPreview');
  const placeholder = document.getElementById('editCoverPlaceholder');
  if (book.coverUrl) {
    preview.src = book.coverUrl;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    preview.style.display = 'none';
    placeholder.style.display = 'flex';
  }

  openPanel('edit');
}

document.getElementById('editCoverBtn').addEventListener('click', () => {
  document.getElementById('editCoverInput').click();
});

document.getElementById('editCoverInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    editingCoverDataUrl = ev.target.result;
    const preview = document.getElementById('editCoverPreview');
    const placeholder = document.getElementById('editCoverPlaceholder');
    preview.src = editingCoverDataUrl;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

document.getElementById('editSaveBtn').addEventListener('click', async () => {
  const book = state.books.find(b => b.id === editingBookId);
  if (!book) return;
  book.title  = document.getElementById('editTitle').value.trim() || book.title;
  book.author = document.getElementById('editAuthor').value.trim() || book.author;
  if (editingCoverDataUrl) book.coverUrl = editingCoverDataUrl;
  await dbPut('books', book);
  closePanel('edit');
  renderLibrary();
  showToast('Saved');
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════

function injectManifest() {
  const manifest = {
    name: "Reader",
    short_name: "Reader",
    display: "standalone",
    background_color: "#0f0f0f",
    theme_color: "#0f0f0f",
    orientation: "portrait",
    icons: [{
      src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230f0f0f'/><text y='.9em' font-size='80' x='10'>📖</text></svg>",
      sizes: "any",
      type: "image/svg+xml"
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  document.getElementById('manifestLink').href = URL.createObjectURL(blob);
}

async function init() {
  db = await openDB();
  await loadSettings();
  await loadLibrary();
  await loadBookmarks();
  await loadGridSize();
  injectManifest();
}

init().catch(console.error);
</script>
